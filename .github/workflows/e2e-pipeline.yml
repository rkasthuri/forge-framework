# ─────────────────────────────────────────────────────────────
# E2E AI Testing Framework — GitHub Actions Pipeline
# Step 8: CI/CD Wiring
#
# Triggers:
#   - Push to main/develop
#   - Pull requests to main
#   - Nightly at 6AM UTC (full suite including flaky tests)
#   - Manual dispatch with suite selection
# ─────────────────────────────────────────────────────────────

name: E2E AI Testing Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'reports/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'reports/**'
  schedule:
    - cron: '0 6 * * *'   # Nightly 6AM UTC — full suite
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - full
          - flaky
          - smoke

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
permissions:
  contents: write
  pull-requests: write
  checks: write
  
env:
  CI: true
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    # ← add this line
  PASSWORD: ${{ secrets.PASSWORD }}
  USER_STANDARD: ${{ secrets.USER_STANDARD }}
  USER_LOCKED: ${{ secrets.USER_LOCKED }}
  USER_PROBLEM: ${{ secrets.USER_PROBLEM }}
  USER_GLITCH: ${{ secrets.USER_GLITCH }}
  USER_ERROR: ${{ secrets.USER_ERROR }}
  USER_VISUAL: ${{ secrets.USER_VISUAL }}

jobs:
  # ── Job 1: Run the Playwright suite, hand reports/ to the AI job ──
  test:
    name: Test (Playwright suite)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-jammy
      options: --user 1001
    outputs:
      run_id: ${{ steps.runid.outputs.run_id }}

    steps:
      # ── Setup ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # TD-070: establish ONE canonical run id at run-start. Echo to the job
      # output (consumed by ai-pipeline via needs.test.outputs.run_id) AND to
      # $GITHUB_ENV so this job's own stages (db:migrate, tests + healing) write
      # the same id. Generated once here — no stage re-derives it.
      - name: Establish canonical run id
        id: runid
        run: |
          RID=$(date -u +"%Y-%m-%dT%H-%M-%S")
          echo "run_id=$RID" >> "$GITHUB_OUTPUT"
          echo "CURRENT_RUN_ID=$RID" >> "$GITHUB_ENV"
          echo "Canonical run id: $RID"

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # TD-052: schema was never created in CI — forge-framework.db is
      # gitignored and getDb() only opens the connection, never creates tables.
      # runMigrations() is idempotent — safe to run on every CI job.
      - name: Run database migrations
        run: npm run db:migrate

      # ── Unit proofs gate (fast, <5s) — fail before burning the full suite ──
      - name: Run unit tests (TD-066 + TD-067 proof)
        run: npm run test:unit
        # Proof tests for TD-066 (FlowConfidence derivation, 7 tests) and
        # TD-067 (InputHealth gate, 12 tests). Fails the build if either
        # honesty-floor proof regresses.

      # ── Determine which suite to run ─────────────────────────
      - name: Set test command
        id: suite
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "cmd=npx playwright test" >> $GITHUB_OUTPUT
            echo "label=Full suite (nightly)" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.suite }}" in
              full)   echo "cmd=npx playwright test" >> $GITHUB_OUTPUT
                      echo "label=Full suite (manual)" >> $GITHUB_OUTPUT ;;
              flaky)  echo "cmd=npx playwright test --grep '@slow|@flaky'" >> $GITHUB_OUTPUT
                      echo "label=Flaky suite (manual)" >> $GITHUB_OUTPUT ;;
              smoke)  echo "cmd=npx playwright test loginFast.spec.ts e2e-journey.spec.ts" >> $GITHUB_OUTPUT
                      echo "label=Smoke suite (manual)" >> $GITHUB_OUTPUT ;;
              *)      echo "cmd=npx playwright test --grep-invert '@slow|@flaky'" >> $GITHUB_OUTPUT
                      echo "label=Stable suite (manual)" >> $GITHUB_OUTPUT ;;
            esac
          else
            echo "cmd=npx playwright test --grep-invert '@slow|@flaky'" >> $GITHUB_OUTPUT
            echo "label=Stable suite" >> $GITHUB_OUTPUT
          fi

      # ── Run tests ────────────────────────────────────────────
      - name: Run Playwright tests (${{ steps.suite.outputs.label }})
        id: tests
        run: |
            case "${{ steps.suite.outputs.label }}" in
                "Full suite (nightly)")
                    npx playwright test ;;
                "Smoke suite (manual)")
                    npx playwright test loginFast.spec.ts e2e-journey.spec.ts ;;
                "Flaky suite (manual)")
                    npx playwright test --grep "@slow|@flaky" ;;
                *)
                    npx playwright test --grep-invert "@slow|@flaky" ;;
            esac
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PASSWORD: ${{ secrets.PASSWORD }}
          USER_STANDARD: ${{ secrets.USER_STANDARD }}
          USER_LOCKED: ${{ secrets.USER_LOCKED }}
          USER_PROBLEM: ${{ secrets.USER_PROBLEM }}
          USER_GLITCH: ${{ secrets.USER_GLITCH }}
          USER_ERROR: ${{ secrets.USER_ERROR }}
          USER_VISUAL: ${{ secrets.USER_VISUAL }}
          STANDARD_USER_CREDENTIALS: ${{ secrets.STANDARD_USER_CREDENTIALS }}
          LOCKED_USER_CREDENTIALS: ${{ secrets.LOCKED_USER_CREDENTIALS }}
          ORANGEHRM_ADMINUSER_CREDENTIALS: ${{ secrets.ORANGEHRM_ADMINUSER_CREDENTIALS }}
          BOOKER_CREDENTIALS: ${{ secrets.BOOKER_CREDENTIALS }}

      # ── Provenance sidecar (TD-067) ──────────────────────────
      # Written AFTER tests (test-results.json now exists) and BEFORE the reports/
      # upload, so it rides along in the forge-reports artifact to the AI Pipeline
      # job. CURRENT_RUN_ID is already in $GITHUB_ENV (from "Establish canonical run
      # id"); GITHUB_SHA is a built-in. if: always() so provenance is written even
      # when the tests step failed (it is continue-on-error).
      - name: Write provenance sidecar
        if: always()
        run: |
          echo '{
            "runId": "'"$CURRENT_RUN_ID"'",
            "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'",
            "gitSha": "'"$GITHUB_SHA"'",
            "provenanceVersion": 1
          }' > reports/provenance.json
          echo "[provenance] wrote reports/provenance.json for run $CURRENT_RUN_ID"

      # ── Upload artifacts ─────────────────────────────────────
      # Playwright HTML report is produced here in Job 1.
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: reports/playwright-report/
          retention-days: 14

      # Hand the full reports/ dir to the AI pipeline job (Job 2).
      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-reports
          path: reports/
          retention-days: 1

  # ── Job 2: AI pipeline on a BARE runner (no container) ──────
  # Root cause of the "Premature close" FetchError (TD-053): the hardened
  # Playwright container's network stack terminates outbound HTTPS body
  # streams to api.anthropic.com mid-response. A bare ubuntu-latest runner
  # has full egress, so triage / adaptive-fixes API calls complete. This
  # job has NO container by design — that is the fix, do not add one.
  ai-pipeline:
    name: AI Pipeline (triage / store / fixes / notify)
    runs-on: ubuntu-latest
    needs: test
    if: always()   # run even when tests fail — triage is most useful then
    # TD-070: consume the canonical run id from Job-1's output as CURRENT_RUN_ID
    # for every stage in this job (results-store consumes it now; triage/perf in
    # later steps). Job-level env so all steps inherit it.
    env:
      CURRENT_RUN_ID: ${{ needs.test.outputs.run_id }}

    steps:
      # ── Setup ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Fresh runner → fresh gitignored DB → needs the schema (TD-052).
      - name: Run database migrations
        run: npm run db:migrate

      - name: Download reports artifact
        uses: actions/download-artifact@v4
        with:
          name: forge-reports
          path: reports/

      # ── AI Pipeline steps ────────────────────────────────────
      # TD-042 — paths corrected to src/pipeline/*.ts (moved there in
      # 5ec522a, 2026-06-11; the workflow was never updated, so all six
      # steps below silently no-op'd on ERR_MODULE_NOT_FOUND for ~2 weeks,
      # masked by continue-on-error: true on every one of them).
      - name: AI Triage — RCA analysis
        if: always()
        run: npx tsx src/pipeline/ai-triage.ts
        # continue-on-error removed — confirmed running clean locally
        # against the corrected path (TD-042); a future failure here is a
        # real signal worth surfacing, not noise.

      - name: Results Store — persist run
        if: always()
        run: npx tsx src/pipeline/results-store.ts
        # continue-on-error removed — confirmed running clean locally
        # against the corrected path (TD-042).

      - name: Adaptive Fixes — generate suggestions
        if: always()
        run: npx tsx src/pipeline/adaptive-fixes.ts --dry-run
        # continue-on-error removed — confirmed running clean locally
        # against the corrected path (TD-042); --dry-run already prevents
        # this step from mutating anything even on success.

      - name: Trend Analysis — build dashboard
        if: always()
        run: npx tsx src/pipeline/trend-analysis.ts
        continue-on-error: true
        # Kept — confirmed via local testing (TD-042) that this script has
        # its own pre-existing bug independent of the path fix: it expects
        # RunRepository rows in the old JSON-file-era shape
        # (run.stats.passRate, run.durationMs), but the DB-backed
        # RunsTable is flat/snake_case and has no flaky or pass_rate
        # column at all. Crashes every run until that's fixed separately.
        # See TD-051. Removing continue-on-error here would just fail the
        # job on every push for an unrelated reason.

      - name: Release Notes — generate report
        if: always()
        run: npx tsx src/pipeline/release-notes.ts --sprint
        continue-on-error: true
        # Kept — same TD-051 schema mismatch, a different call site in
        # this script. See the Trend Analysis step's note above.

      - name: Notifications — Slack + Email
        if: always()
        run: npx tsx src/pipeline/notifier.ts --ci
        continue-on-error: true
        # Kept, deliberately not removed yet — unlike the three steps
        # above, this one was not verified locally (running it for real
        # would have sent a live Slack message + email; held pending a
        # separate decision). Confirm via a real CI run before removing
        # this net (TD-042).

      - name: Commit run history back to repo
        if: always()
        run: |
          git config --global user.name "RYQ Pipeline"
          git config --global user.email "actions@github.com"
          git add reports/run-history.json reports/trends.json || true
          git diff --staged --quiet || git commit -m "ci: update run history [skip ci]"
          git push origin main || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload artifacts (produced by the AI steps above) ────
      - name: Upload Triage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: triage-report-${{ github.run_number }}
          path: |
            reports/triage-report.json
            reports/triage-report.md
          retention-days: 14

      - name: Upload Trend dashboard
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trend-dashboard-${{ github.run_number }}
          path: reports/trend-dashboard.html
          retention-days: 14

      - name: Upload Suggested fixes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: suggested-fixes-${{ github.run_number }}
          path: reports/suggested-fixes.md
          retention-days: 14

      - name: Upload Release Notes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-notes-${{ github.run_number }}
          path: |
            reports/release-notes.md
            reports/release-notes.html
          retention-days: 30

      # ── Post PR comment ──────────────────────────────────────
      - name: Read triage summary
        id: triage
        if: always()
        run: |
          if [ -f reports/triage-report.json ]; then
            FAILED=$(cat reports/triage-report.json | node -e "const j=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(j.totalFailed ?? 0)")
            APPBUG=$(cat reports/triage-report.json | node -e "const j=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(j.summary?.['app-bug'] ?? 0)")
            TESTDEF=$(cat reports/triage-report.json | node -e "const j=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(j.summary?.['test-defect'] ?? 0)")
            INFRA=$(cat reports/triage-report.json | node -e "const j=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(j.summary?.['infra-defect'] ?? 0)")
            FLAKY=$(cat reports/triage-report.json | node -e "const j=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(j.summary?.['flaky'] ?? 0)")
            NEEDS=$(cat reports/triage-report.json | node -e "const j=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(j.summary?.['insufficient-evidence'] ?? 0)")
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "app_bug=$APPBUG" >> $GITHUB_OUTPUT
            echo "test_defect=$TESTDEF" >> $GITHUB_OUTPUT
            echo "infra_defect=$INFRA" >> $GITHUB_OUTPUT
            echo "flaky=$FLAKY" >> $GITHUB_OUTPUT
            echo "needs_review=$NEEDS" >> $GITHUB_OUTPUT
          else
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "app_bug=0" >> $GITHUB_OUTPUT
            echo "test_defect=0" >> $GITHUB_OUTPUT
            echo "infra_defect=0" >> $GITHUB_OUTPUT
            echo "flaky=0" >> $GITHUB_OUTPUT
            echo "needs_review=0" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const failed     = '${{ steps.triage.outputs.failed }}';
            const appBug     = '${{ steps.triage.outputs.app_bug }}';
            const testDefect = '${{ steps.triage.outputs.test_defect }}';
            const flaky      = '${{ steps.triage.outputs.flaky }}';
            const needs      = '${{ steps.triage.outputs.needs_review }}';
            const status = failed === '0' ? '✅ All tests passed' : `⚠️ ${failed} failure(s) detected`;
            const suite  = '${{ steps.suite.outputs.label }}';
            const run    = '${{ github.run_number }}';

            const body = [
              `## E2E Pipeline — Run #${run}`,
              '',
              `**Status:** ${status}  `,
              `**Suite:** ${suite}  `,
              `**Commit:** \`${{ github.sha }}`.slice(0, 14) + '\`',
              '',
              '### AI Triage Results',
              '',
              '| Classification | Count |',
              '|---|---|',
              `| 🐛 Application Defects | ${appBug} |`,
              `| 🔧 Test Defects | ${testDefect} |`,
              `| 🟡 Flaky | ${flaky} |`,
              `| ❓ Needs Review | ${needs} |`,
              '',
              '### Artifacts',
              `- 📄 [Playwright Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              `- 📊 Trend dashboard — download from run artifacts`,
              `- 📝 Suggested fixes — download from run artifacts`,
              '',
              appBug > 0
                ? `> ⚠️ **${appBug} Application defect(s) detected** — review suggested-fixes.md before merging.`
                : '> Pipeline healthy — safe to merge.',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # ── Triage summary (INFORMATIONAL — non-blocking per §4 / TD-063 / TD-078) ──
      - name: Check test outcome
        if: always()
        run: |
          echo "ℹ️  Triage attribution (INFORMATIONAL — non-blocking per §4/TD-078):"
          echo "Application Defects (app-bug): ${{ steps.triage.outputs.app_bug }}"
          echo "Test Defects:                  ${{ steps.triage.outputs.test_defect }}"
          echo "Infra Defects:                 ${{ steps.triage.outputs.infra_defect }}"
          echo "Flaky:                         ${{ steps.triage.outputs.flaky }}"
          echo "Needs Review:                  ${{ steps.triage.outputs.needs_review }}"
          echo "Note: bug-gate is non-blocking; only app-bug represents a real application defect (TD-063/TD-078)."

  # ── Job 3: Notify on failure ─────────────────────────────────
  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [test, ai-pipeline]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Pipeline failed
        run: |
          echo "Pipeline failed on main branch."
          echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
